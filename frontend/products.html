<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Products &mdash; THREAD</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Thread</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html" class="active">Products</a></li>
      <li><a href="orders.html">Orders</a></li>
      <li><a href="customers.html">Customers</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <h1 class="page-title">Products</h1>
    <p id="product-count">Showing 6 items</p>
  </div>

  <div class="filters">
    <span class="filter-label">Filter:</span>
    <button class="filter-btn active" onclick="filterProducts('all', this)">All</button>
    <button class="filter-btn" onclick="filterProducts('tops', this)">Tops</button>
    <button class="filter-btn" onclick="filterProducts('bottoms', this)">Bottoms</button>
    <button class="filter-btn" onclick="filterProducts('outerwear', this)">Outerwear</button>
    <button class="filter-btn" onclick="filterProducts('accessories', this)">Accessories</button>
    <input class="search-box" type="text" placeholder="Search products..." oninput="searchProducts(this.value)"/>
  </div>

  <div class="products-grid" id="products-grid"></div>

  <div class="table-section">
    <p class="section-label">Product Variants Table</p>
    <table>
      <thead>
        <tr>
          <th>Variant ID</th>
          <th>Product ID</th>
          <th>Product Name</th>
          <th>Size</th>
          <th>Color</th>
          <th>Stock Qty</th>
          <th>Unit Price</th>
        </tr>
      </thead>
      <tbody id="variants-body"></tbody>
    </table>
  </div>

  <footer>
    <div class="footer-logo">Thread</div>
    <p>COP 4710 &mdash; Database Final Project</p>
    <p>Skyler &middot; Rachelle &middot; Jayden &middot; Sabrina</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
